name: CI

on:
  push:
    branches: [main, auth]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint & type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check imports resolve
        run: python -c "from app.main import app; print('OK')"
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/talktome
          SECRET_KEY: ci-secret-key
          OPENAI_API_KEY: sk-fake-key-for-ci

  frontend:
    name: Frontend — type check & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: /api

  docker:
    name: Docker — build images
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build ./backend -t talktome-backend:ci

      - name: Build frontend image
        run: docker build ./frontend -t talktome-frontend:ci
